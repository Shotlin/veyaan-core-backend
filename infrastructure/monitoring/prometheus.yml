global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'veyaan-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  - job_name: 'veyaan-gateway'
    static_configs:
      - targets: ['gateway:8001']
    metrics_path: '/metrics'

  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']