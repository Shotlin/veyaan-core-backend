name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: veyaan_test
          POSTGRES_USER: veyaan
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
        options: >-
          --health-cmd "nats server check connection -s nats://localhost:4222"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Run MyPy
        # GAP-P1-4: removed '|| true' — MyPy must fail the build
        run: mypy app/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://veyaan:test_password@localhost:5432/veyaan_test
          NATS_URL: nats://localhost:4222
          VALKEY_URL: redis://localhost:6379
          ENVIRONMENT: test
        # GAP-P1-5: coverage threshold raised from 30% to 70%
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term --cov-report=xml --cov-fail-under=70

      - name: Build ARM64 API image
        run: |
          docker buildx build --platform linux/arm64 -t veyaan-api:test --load -f Dockerfile .

      - name: Build ARM64 Gateway image
        run: |
          docker buildx build --platform linux/arm64 -t veyaan-gateway:test --load -f Dockerfile.gateway .

      - name: Build ARM64 Worker image
        run: |
          docker buildx build --platform linux/arm64 -t veyaan-worker:test --load -f Dockerfile.worker .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --fail --no-verification

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit SAST
        # GAP-P1-5: Fails on HIGH findings (not suppressed)
        run: |
          bandit -r app/ -f json -o bandit-report.json -ll
          if grep -q '"issue_severity": "HIGH"' bandit-report.json; then
            echo "::error::High severity security issues found by Bandit"
            cat bandit-report.json
            exit 1
          fi
          echo "Bandit scan complete — no HIGH severity issues"

      - name: Run dependency audit
        # GAP-P1-5: Fails on known vulnerabilities (not suppressed with || true)
        run: pip-audit --requirement requirements.txt

      - name: Trivy image scan — API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'veyaan-api:test'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
        continue-on-error: true  # Images built in separate job; scan for reporting

  migration-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: veyaan_migration_test
          POSTGRES_USER: veyaan
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic upgrade (empty DB)
        env:
          DATABASE_URL: postgresql+asyncpg://veyaan:test_password@localhost:5432/veyaan_migration_test
        run: alembic upgrade head

      - name: Check for model/migration drift
        env:
          DATABASE_URL: postgresql+asyncpg://veyaan:test_password@localhost:5432/veyaan_migration_test
        run: |
          output=$(alembic check 2>&1 || true)
          if echo "$output" | grep -q "Target database is not up to date"; then
            echo "::error::Migration drift detected — model changes not reflected in migrations"
            exit 1
          fi
          echo "No migration drift detected"
