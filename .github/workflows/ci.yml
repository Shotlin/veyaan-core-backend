name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      
      - name: Run Ruff
        run: ruff check .
      
      - name: Run MyPy
        run: mypy app/
      
      - name: Run tests
        run: pytest tests/ -v --tb=short
      
      - name: Build ARM64 API image
        run: |
          docker buildx build --platform linux/arm64 -t veyaan-api:test --load -f Dockerfile .
      
      - name: Build ARM64 Gateway image
        run: |
          docker buildx build --platform linux/arm64 -t veyaan-gateway:test --load -f Dockerfile.gateway .
      
      - name: Build ARM64 Worker image
        run: |
          docker buildx build --platform linux/arm64 -t veyaan-worker:test --load -f Dockerfile.worker .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --fail --no-verification
      
      - name: Run Bandit
        run: |
          pip install bandit
          bandit -r app/ -f json -o bandit-report.json || true
          cat bandit-report.json